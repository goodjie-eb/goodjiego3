<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回憶打卡 | 台南柑仔蜜之旅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="memories.css">
</head>
<body>
    <div class="texture-overlay"></div>

    <header class="hero" style="height: auto; padding: 4rem 0 2rem 0; margin-bottom: 3rem;">
        <div class="hero-bg-texture"></div>
        <div class="hero-content">
            <h1 class="sticker-text" style="font-size: 4rem;">回憶打卡</h1>
            <p class="hero-subtitle">用照片記錄我們的台南旅程</p>
        </div>
        <div class="hero-banner-bottom">
            <span>上傳你的美好瞬間</span>
            <a href="index.html" class="btn-retro" style="text-decoration: none;">回行程總覽</a>
            <span>打造專屬回憶錄</span>
        </div>
    </header>

    <main class="container">
        <!-- Day Tabs -->
        <div class="day-tabs" id="dayTabs">
            <button class="day-tab active" data-day="1">
                <span class="tab-icon">🌅</span>
                <span class="tab-label">第一天</span>
                <span class="tab-date">5/23</span>
            </button>
            <button class="day-tab" data-day="2">
                <span class="tab-icon">☀️</span>
                <span class="tab-label">第二天</span>
                <span class="tab-date">5/24</span>
            </button>
            <button class="day-tab" data-day="3">
                <span class="tab-icon">🌇</span>
                <span class="tab-label">第三天</span>
                <span class="tab-date">5/25</span>
            </button>
        </div>

        <!-- Day 1 -->
        <div class="day-panel active" id="day1">
            <div class="day-header">
                <div class="day-title-wrapper">
                    <div class="circle-text">第</div>
                    <div class="circle-text">一</div>
                    <div class="circle-text">日</div>
                    <span class="date-text">5/23 (六)</span>
                </div>
            </div>
            <div class="memory-grid" id="grid-day1"></div>
        </div>

        <!-- Day 2 -->
        <div class="day-panel" id="day2">
            <div class="day-header">
                <div class="day-title-wrapper">
                    <div class="circle-text">第</div>
                    <div class="circle-text">二</div>
                    <div class="circle-text">日</div>
                    <span class="date-text">5/24 (日)</span>
                </div>
            </div>
            <div class="memory-grid" id="grid-day2"></div>
        </div>

        <!-- Day 3 -->
        <div class="day-panel" id="day3">
            <div class="day-header">
                <div class="day-title-wrapper">
                    <div class="circle-text">第</div>
                    <div class="circle-text">三</div>
                    <div class="circle-text">日</div>
                    <span class="date-text">5/25 (一)</span>
                </div>
            </div>
            <div class="memory-grid" id="grid-day3"></div>
        </div>

        <!-- Photo counter -->
        <div class="photo-counter" id="photoCounter">
            <span class="counter-icon">📸</span>
            <span class="counter-text">已收集 <strong id="totalPhotos">0</strong> / 45 張回憶</span>
        </div>
    </main>

    <!-- Backdrop for expanded photos -->
    <div class="photo-backdrop" id="photoBackdrop"></div>

    <footer>
        <p>台南復古之旅 2026</p>
    </footer>

    <script>
    (function() {
        const STORAGE_KEY = 'tainan_memories_v2';
        const TITLES_KEY = 'tainan_zone_titles';
        const PHOTOS_PER_ZONE = 3;

        // Zone config: day -> [zone names]
        const ZONE_CONFIG = {
            day1: ['啟程台南', '陳家汕頭麵', '天下南隅', '臨水夫人媽廟', '和洋亭真夏'],
            day2: ['自由探索', '巷弄探險', '午後時光', '街頭美食', '蕪麦酒食'],
            day3: ['奇美博物館', '埃及展', '午餐時光', '最後巡禮', '滿載賦歸']
        };

        // State: { "day1_z0_p0": "data:image/...", ... }
        let photoState = {};
        let titleState = {};

        // ========== Load State ==========
        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) photoState = JSON.parse(saved);
            } catch(e) { photoState = {}; }
            try {
                const saved = localStorage.getItem(TITLES_KEY);
                if (saved) titleState = JSON.parse(saved);
            } catch(e) { titleState = {}; }
        }

        function savePhotos() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(photoState));
            } catch(e) {
                console.warn('儲存空間已滿，無法儲存更多照片。');
            }
        }

        function saveTitles() {
            try {
                localStorage.setItem(TITLES_KEY, JSON.stringify(titleState));
            } catch(e) {}
        }

        // ========== Build UI ==========
        function buildAllGrids() {
            Object.keys(ZONE_CONFIG).forEach(dayKey => {
                const grid = document.getElementById('grid-' + dayKey);
                if (!grid) return;
                grid.innerHTML = '';
                ZONE_CONFIG[dayKey].forEach((zoneName, zoneIdx) => {
                    grid.appendChild(buildZone(dayKey, zoneIdx, zoneName));
                });
            });
        }

        function buildZone(dayKey, zoneIdx, defaultName) {
            const zoneId = dayKey + '_z' + zoneIdx;
            const zone = document.createElement('div');
            zone.className = 'memory-zone';
            zone.id = zoneId;

            // Header
            const header = document.createElement('div');
            header.className = 'zone-header';

            const num = document.createElement('span');
            num.className = 'zone-number';
            num.textContent = String(zoneIdx + 1).padStart(2, '0');

            const title = document.createElement('h3');
            title.className = 'zone-title';
            title.contentEditable = 'true';
            title.textContent = titleState[zoneId] || defaultName;
            title.addEventListener('blur', () => {
                titleState[zoneId] = title.textContent.trim() || defaultName;
                saveTitles();
            });

            header.appendChild(num);
            header.appendChild(title);
            zone.appendChild(header);

            // Photo slots
            const gallery = document.createElement('div');
            gallery.className = 'photo-slots';

            for (let i = 0; i < PHOTOS_PER_ZONE; i++) {
                gallery.appendChild(buildSlot(dayKey, zoneIdx, i));
            }

            zone.appendChild(gallery);
            return zone;
        }

        function buildSlot(dayKey, zoneIdx, photoIdx) {
            const key = dayKey + '_z' + zoneIdx + '_p' + photoIdx;
            const slot = document.createElement('div');
            slot.className = 'photo-slot';
            slot.id = 'slot-' + key;

            const existingPhoto = photoState[key];

            if (existingPhoto) {
                // Show photo with delete overlay
                renderFilledSlot(slot, key, existingPhoto);
            } else {
                // Show upload placeholder
                renderEmptySlot(slot, key);
            }

            return slot;
        }

        function renderEmptySlot(slot, key) {
            slot.innerHTML = '';
            slot.classList.remove('has-photo');
            slot.classList.add('empty');

            const label = document.createElement('label');
            label.className = 'slot-upload-label';

            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.className = 'file-input';
            input.addEventListener('change', function() {
                if (this.files && this.files[0]) {
                    handleUpload(this.files[0], key, slot);
                }
            });

            const icon = document.createElement('div');
            icon.className = 'slot-upload-icon';
            icon.innerHTML = `
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <path d="M18 6v24M6 18h24" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
                </svg>
            `;

            const text = document.createElement('span');
            text.className = 'slot-upload-text';
            text.textContent = '上傳照片';

            label.appendChild(input);
            label.appendChild(icon);
            label.appendChild(text);
            slot.appendChild(label);

            // Drag & drop
            slot.addEventListener('dragover', (e) => {
                e.preventDefault();
                slot.classList.add('drag-over');
            });
            slot.addEventListener('dragleave', () => {
                slot.classList.remove('drag-over');
            });
            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleUpload(e.dataTransfer.files[0], key, slot);
                }
            });
        }

        function renderFilledSlot(slot, key, src) {
            slot.innerHTML = '';
            slot.classList.remove('empty', 'drag-over');
            slot.classList.add('has-photo');

            const img = document.createElement('img');
            img.src = src;
            img.alt = '回憶照片';
            img.className = 'slot-photo';
            img.loading = 'lazy';
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleExpand(slot);
            });

            const overlay = document.createElement('div');
            overlay.className = 'slot-overlay';

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'slot-delete-btn';
            deleteBtn.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M4 6h12M8 6V4h4v2M6 6v10a1 1 0 001 1h6a1 1 0 001-1V6M9 9v5M11 9v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>刪除</span>
            `;
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                // Animate out
                slot.classList.add('removing');
                setTimeout(() => {
                    delete photoState[key];
                    savePhotos();
                    updateCounter();
                    slot.classList.remove('removing');
                    renderEmptySlot(slot, key);
                }, 300);
            });

            overlay.appendChild(deleteBtn);
            slot.appendChild(img);
            slot.appendChild(overlay);
        }

        function handleUpload(file, key, slot) {
            if (!file.type.startsWith('image/')) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                // Compress/resize to square before saving
                resizeToSquare(e.target.result, 800, (squareSrc) => {
                    photoState[key] = squareSrc;
                    savePhotos();
                    updateCounter();
                    // Animate in
                    slot.classList.add('uploading');
                    setTimeout(() => {
                        renderFilledSlot(slot, key, squareSrc);
                        slot.classList.remove('uploading');
                        slot.classList.add('just-uploaded');
                        setTimeout(() => slot.classList.remove('just-uploaded'), 600);
                    }, 200);
                });
            };
            reader.readAsDataURL(file);
        }

        // Crop & resize image to square
        function resizeToSquare(src, size, callback) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // Center crop to square
                const min = Math.min(img.width, img.height);
                const sx = (img.width - min) / 2;
                const sy = (img.height - min) / 2;

                ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
                callback(canvas.toDataURL('image/jpeg', 0.85));
            };
            img.src = src;
        }

        // ========== Counter ==========
        function updateCounter() {
            let total = Object.keys(photoState).length;
            document.getElementById('totalPhotos').textContent = total;
        }

        // ========== Expand/Collapse Toggle ==========
        const backdrop = document.getElementById('photoBackdrop');
        let currentExpanded = null;

        function toggleExpand(slot) {
            if (slot.classList.contains('expanded')) {
                collapsePhoto(slot);
            } else {
                // Collapse any other expanded photo first
                if (currentExpanded && currentExpanded !== slot) {
                    collapsePhoto(currentExpanded);
                }
                expandPhoto(slot);
            }
        }

        function expandPhoto(slot) {
            slot.classList.add('expanded');
            backdrop.classList.add('active');
            currentExpanded = slot;
            document.body.style.overflow = 'hidden';
        }

        function collapsePhoto(slot) {
            slot.classList.remove('expanded');
            backdrop.classList.remove('active');
            currentExpanded = null;
            document.body.style.overflow = '';
        }

        // Click backdrop to collapse
        backdrop.addEventListener('click', () => {
            if (currentExpanded) collapsePhoto(currentExpanded);
        });

        // Escape key to collapse
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && currentExpanded) collapsePhoto(currentExpanded);
        });

        // ========== Day Tab Switching ==========
        const tabs = document.querySelectorAll('.day-tab');
        const panels = document.querySelectorAll('.day-panel');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const day = tab.dataset.day;
                tabs.forEach(t => t.classList.remove('active'));
                panels.forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('day' + day).classList.add('active');
            });
        });

        // ========== Init ==========
        loadState();
        buildAllGrids();
        updateCounter();

    })();
    </script>
</body>
</html>
