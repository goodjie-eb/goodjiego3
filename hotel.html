<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住宿資訊 | 天下南隅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="texture-overlay"></div>

    <header class="hero" style="height: 30vh; padding: 4rem 0 2rem 0; margin-bottom: 3rem;">
        <div class="hero-bg-texture"></div>
        <div class="hero-content">
            <h1 class="sticker-text" style="font-size: 4rem;">住宿資訊</h1>
        </div>
        <div class="hero-banner-bottom" style="flex-direction: row; gap: 0.6rem; justify-content: center; padding: 0.8rem 1.5rem;">
            <span>Provintia Hotel</span>
            <span class="squiggle">~</span>
            <span>天下南隅</span>
        </div>
    </header>

    <main class="container">
        <div class="flex-row mobile-col" style="margin: 0 auto; max-width: 900px; gap: 4rem; align-items: center;">
            <div style="flex-shrink: 0; display: flex; justify-content: center;">
                <img src="assets/hotel_provintia.png" alt="天下南隅" class="retro-img" style="border-radius: 20px; width: 420px; max-width: 90vw; height: auto; aspect-ratio: 7/5; box-shadow: 8px 8px 0 var(--retro-blue);">
            </div>
            
            <div style="display: flex; flex-direction: column; justify-content: center; gap: 1.5rem;">
                <div>
                    <h3 style="font-size: 2.6rem; line-height: 1.2; margin-bottom: 0.5rem; letter-spacing: 2px;">天下南隅</h3>
                    <p style="color: var(--retro-green); font-size: 1.2rem;">台南市最高質感的摩登復古飯店</p>
                </div>
                
                <div class="card" style="background-color: var(--retro-yellow); padding: 1.5rem; border: 4px solid var(--retro-green); border-radius: 12px; box-shadow: 6px 6px 0 var(--retro-blue);">
                    <p style="margin-bottom: 0.5rem; font-size: 1.1rem;"><strong>📍 地址：</strong> 臺南市北區成功路202號</p>
                    <p style="margin-bottom: 0.5rem; font-size: 1.1rem;"><strong>入住時間：</strong> 5/23 (六) 15:00</p>
                    <p style="font-size: 1.1rem;"><strong>退房時間：</strong> 5/25 (一) 11:00</p>
                </div>
                
                <p style="font-size: 1.1rem; font-weight: 700; color: var(--retro-black); background: var(--retro-bg);">
                    體驗府城的歷史時光，享受帶有摩登台味的文青氛圍空間。我們將在這裡度過舒適的兩晚！
                </p>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 4rem;">
            <a href="index.html" class="btn-retro" style="display: inline-block; text-decoration: none;">回行程總覽</a>
        </div>
    </main>

    <footer>
        <p>台南復古之旅 2026</p>
    </footer>

</body>
</html>
